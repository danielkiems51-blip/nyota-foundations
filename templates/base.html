{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyota Fund KE | Youth Empowerment Financing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #006600;
            --primary-red: #bb0000;
            --primary-black: #000000;
            --bg-light: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f8f8f8;
            background-image:
                radial-gradient(var(--primary-green) 0.5px, transparent 0.5px),
                linear-gradient(135deg, #ffffff 0%, #f8f8f8 100%);
            background-size: 20px 20px, 100% 100%;
            background-attachment: fixed;
            color: var(--text-main);
        }

        .green-gradient-btn {
            background: linear-gradient(to right, #000000 0%, #bb0000 50%, #006600 100%);
        }

        .logo-text {
            color: #000000;
            font-weight: 800;
            text-transform: uppercase;
        }

        .toast-enter {
            animation: slideUpIn 0.5s ease-out forwards;
        }

        @keyframes slideUpIn {
            from {
                transform: translateY(100px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .loading-pulse {
            animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: .5;
            }
        }

        .limit-card.selected {
            border: 2px solid var(--primary-green);
            background-color: #f0fdf4;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.1);
        }

        .modal-overlay {
            background-color: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
        }

        .custom-shadow {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Splash Screen */
        #splash-screen {
            position: fixed;
            inset: 0;
            background: #ffffff;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.8s cubic-bezier(0.65, 0, 0.35, 1);
        }

        #splash-screen.hidden {
            opacity: 0;
            visibility: hidden;
            transform: translateY(-100%);
        }

        .splash-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: logo-entrance 1.2s ease-out forwards;
        }

        .splash-star {
            width: 80px;
            height: 80px;
            color: #FFD700;
            /* Golden */
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.4));
            margin-bottom: 1rem;
        }

        .splash-title {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
            display: flex;
            gap: 0.5rem;
        }

        .splash-target-green {
            color: #006600;
        }

        .splash-target-red {
            color: #bb0000;
        }

        .splash-target-black {
            color: #000000;
        }

        @keyframes logo-entrance {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .loading-bar-container {
            width: 220px;
            height: 6px;
            background: #f8fafc;
            border-radius: 99px;
            overflow: hidden;
            border: 1px solid #f1f5f9;
            margin-top: 1.5rem;
        }

        .loading-bar-progress {
            width: 0%;
            height: 100%;
            background: linear-gradient(to right, #000000, #bb0000, #006600);
            animation: progress-fill 3.5s cubic-bezier(0.1, 0, 0.3, 1) forwards;
        }

        @keyframes progress-fill {
            0% {
                width: 0%;
            }

            30% {
                width: 40%;
            }

            60% {
                width: 70%;
            }

            100% {
                width: 100%;
            }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>

<body class="min-h-screen">
    <!-- Splash Screen -->
    <div id="splash-screen">
        <div class="splash-content">
            <svg class="splash-star" viewBox="0 0 24 24" fill="currentColor">
                <path
                    d="M12 .587l3.668 7.568 8.332 1.151-6.064 5.828 1.48 8.279-7.416-3.967-7.417 3.967 1.481-8.279-6.064-5.828 8.332-1.151z" />
            </svg>
            <h1 class="splash-title">
                <span class="splash-target-black">NYOTA</span>
                <span class="splash-target-red">FUND</span>
            </h1>
            <div class="flex gap-1">
                <div class="w-8 h-1 bg-black"></div>
                <div class="w-8 h-1 bg-[#bb0000]"></div>
                <div class="w-8 h-1 bg-[#006600]"></div>
            </div>
        </div>
        <div class="loading-bar-container">
            <div class="loading-bar-progress"></div>
        </div>
        <p class="mt-6 text-[10px] font-black text-gray-400 uppercase tracking-[0.3em] animate-pulse">Kenya's Youth
            Empowerment</p>
    </div>
    <div
        class="max-w-md mx-auto min-h-screen relative flex flex-col bg-gradient-to-b from-white via-white to-green-50/30 shadow-xl">
        <!-- Header -->
        <header class="px-6 py-4 sticky top-0 z-10 bg-white shadow-sm flex items-center justify-center">
            <h1 class="text-xl font-bold logo-text tracking-tight">NYOTA FUND KE</h1>
        </header>



        <!-- Random Activity Toast Container (Floating) -->
        <div id="activity-toast"
            class="fixed top-24 left-1/2 -translate-x-1/2 w-[calc(100%-48px)] max-w-[380px] z-50 px-6 py-4 bg-white/90 backdrop-blur-md shadow-2xl rounded-2xl border border-gray-100 flex items-center gap-3 transition-all duration-500 opacity-0 -translate-y-4 pointer-events-none">
            <div class="w-8 h-8 rounded-full bg-green-50 flex items-center justify-center text-green-600">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z"></path>
                </svg>
            </div>
            <div class="flex flex-col">
                <p class="text-[11px] font-medium text-gray-800" id="toast-message">0719****77 received Ksh 8,000
                <p class="text-[10px] text-gray-400 mt-0.5">• just now</p>
            </div>
        </div>

        <!-- Background Decorative Elements -->
        <div class="absolute top-0 right-0 -tr-1/2 w-64 h-64 bg-green-500/5 rounded-full blur-3xl pointer-events-none">
        </div>
        <div class="absolute top-1/2 left-0 -tl-1/2 w-80 h-80 bg-green-500/5 rounded-full blur-3xl pointer-events-none">
        </div>

        <!-- Main Content -->
        <main class="flex-grow px-6 py-6 pb-24 relative z-0">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Global Loading Overlay -->
    <div id="global-loader"
        class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-slate-900/40 backdrop-blur-md">
        <div class="bg-white p-8 rounded-[40px] shadow-2xl flex flex-col items-center">
            <div class="w-16 h-16 border-4 border-green-100 border-t-green-600 rounded-full animate-spin"></div>
            <p class="mt-4 font-bold text-gray-800">Please wait...</p>
        </div>
    </div>

    {% block extra_js %}{% endblock %}

    <script>
        // Random Activity Generator
        const phonePrefixes = ['0719', '0722', '0703', '0745', '0798', '0711', '0110', '0748'];
        const amounts = ['5,000', '10,000', '15,000', '25,000', '35,000', '45,000'];

        function showRandomToast() {
            const toast = document.getElementById('activity-toast');
            const message = document.getElementById('toast-message');

            const prefix = phonePrefixes[Math.floor(Math.random() * phonePrefixes.length)];
            const amount = amounts[Math.floor(Math.random() * amounts.length)];
            const suffix = Math.floor(10 + Math.random() * 89);

            message.innerText = `${prefix}****${suffix} received Ksh ${amount}`;

            toast.classList.remove('opacity-0', 'translate-y-4');
            toast.classList.add('opacity-1', 'translate-y-0');

            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-4');
                toast.classList.remove('opacity-1', 'translate-y-0');
            }, 5000);
        }

        setInterval(() => {
            if (Math.random() > 0.5) showRandomToast();
        }, 8000);

        // Hide Splash Screen
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.classList.add('hidden');
                // Allow scrolling after splash
                document.body.style.overflow = 'auto';
            }, 3000); // 3 seconds delay
        });

        // Prevent scrolling during splash
        document.body.style.overflow = 'hidden';
    </script>
</body>

</html>
