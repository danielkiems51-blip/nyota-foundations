services:
  - type: web
    name: nyota-fund
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn nyota_fund.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: 'False'
      - key: PAYHERO_API_URL
        value: 'https://backend.payhero.co.ke/api/v2/payments'
      - key: PAYHERO_CHANNEL_ID
        sync: false
      - key: PAYHERO_API_USERNAME
        sync: false
      - key: PAYHERO_API_PASSWORD
        sync: false
      - key: PAYHERO_CALLBACK_URL
        value: 'https://nyota-fund-project.onrender.com/api/mpesa/callback/'
